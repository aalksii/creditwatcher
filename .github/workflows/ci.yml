name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Node build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

  macos:
    name: macOS Swift build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build CreditWatcher.app
        run: |
          xcodebuild \
            -project macos/CreditWatcher.xcodeproj \
            -scheme CreditWatcher \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
