name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS Swift build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Build CreditWatcher.app
        run: |
          xcodebuild \
            -project macos/CreditWatcher.xcodeproj \
            -scheme CreditWatcher \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
