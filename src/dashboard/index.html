<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>creditwatcher</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-2: #232733;
      --border: #2e3340;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #6ea8fe;
      --green: #3dd68c;
      --yellow: #f5c542;
      --red: #f87171;
      --radius: 12px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    button {
      background: var(--accent);
      color: #0f1117;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-line {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .provider-name {
      font-size: 1.125rem;
      font-weight: 600;
    }

    .plan-badge {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.65rem;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      word-break: break-all;
    }

    .alert {
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: #fecaca;
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      font-size: 0.85rem;
    }

    .alert.info {
      background: rgba(110, 168, 254, 0.1);
      border-color: rgba(110, 168, 254, 0.35);
      color: #bfdbfe;
    }

    .alert.warn {
      background: rgba(245, 197, 66, 0.1);
      border-color: rgba(245, 197, 66, 0.35);
      color: #fde68a;
    }

    .windows { display: flex; flex-direction: column; gap: 1rem; }

    .window label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
    }

    .window .label-name { font-weight: 500; }
    .window .label-stats { color: var(--muted); }

    .bar-track {
      height: 10px;
      background: var(--surface-2);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .bar-fill.low { background: var(--green); }
    .bar-fill.mid { background: var(--yellow); }
    .bar-fill.high { background: var(--red); }

    .reset {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .credits {
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
    }

    .credits strong { color: var(--text); }

    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 0.5rem 0;
    }

    .footer-note {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading .card { animation: pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="page" id="app">
    <header>
      <div class="brand">
        <h1>creditwatcher</h1>
        <p>AI subscription limits — local only</p>
      </div>
      <div class="actions">
        <span class="status-line" id="status-line">Loading…</span>
        <button id="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <div class="grid" id="cards"></div>

    <p class="footer-note">
      Read-only usage checks · Tokens never leave your machine · Auto-refresh every 60s
    </p>
  </div>

  <script>
    const REFRESH_MS = 60_000;
    const cardsEl = document.getElementById("cards");
    const statusLine = document.getElementById("status-line");
    const refreshBtn = document.getElementById("refresh-btn");
    const app = document.getElementById("app");

    let timer = null;

    function barClass(used) {
      if (used >= 90) return "high";
      if (used >= 70) return "mid";
      return "low";
    }

    function formatDuration(seconds) {
      if (seconds == null || seconds <= 0) return "now";
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      const parts = [];
      if (h > 0) parts.push(h + "h");
      if (m > 0) parts.push(m + "m");
      if (s > 0 && h === 0) parts.push(s + "s");
      return parts.join(" ") || "0s";
    }

    function formatTime(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderWindow(w) {
      const used = w.usedPercent.toFixed(1);
      const left = w.remainingPercent.toFixed(1);
      const resetText = w.resetAfterSeconds != null
        ? "Resets in " + formatDuration(w.resetAfterSeconds)
        : w.resetAt
          ? "Resets at " + new Date(w.resetAt).toLocaleString()
          : "";

      return `
        <div class="window">
          <label>
            <span class="label-name">${escapeHtml(w.label)}</span>
            <span class="label-stats">${used}% used · ${left}% left</span>
          </label>
          <div class="bar-track">
            <div class="bar-fill ${barClass(w.usedPercent)}" style="width: ${Math.min(100, w.usedPercent)}%"></div>
          </div>
          ${resetText ? `<div class="reset">${escapeHtml(resetText)}</div>` : ""}
        </div>
      `;
    }

    function renderProvider(name, p) {
      const title = name === "codex" ? "Codex" : "Claude";
      const plan = p.plan || p.account || "—";
      const alerts = [];

      if (p.status === "not_connected") {
        alerts.push(`<div class="alert info">${escapeHtml(p.loginHint || "Not connected")}</div>`);
      } else if (p.status === "error" && p.error) {
        alerts.push(`<div class="alert">${escapeHtml(p.error)}</div>`);
      } else if (p.status === "cooldown" && p.error) {
        alerts.push(`<div class="alert warn">${escapeHtml(p.error)}</div>`);
      }

      for (const w of p.warnings || []) {
        alerts.push(`<div class="alert warn">${escapeHtml(w)}</div>`);
      }

      const windows = (p.windows || []).length
        ? `<div class="windows">${p.windows.map(renderWindow).join("")}</div>`
        : `<div class="empty">No usage windows available</div>`;

      let credits = "";
      if (p.credits) {
        if (p.credits.unlimited) {
          credits = `<div class="credits"><strong>Credits:</strong> unlimited</div>`;
        } else if (p.credits.balance != null) {
          credits = `<div class="credits"><strong>Credits balance:</strong> ${escapeHtml(p.credits.balance)}</div>`;
        }
      }

      const auth = p.authSource
        ? `<div class="meta">Auth: ${escapeHtml(p.authSource)}</div>`
        : "";

      const updated = p.lastUpdated
        ? `<div class="meta">Last updated: ${formatTime(p.lastUpdated)}</div>`
        : "";

      return `
        <article class="card">
          <div class="card-header">
            <div class="provider-name">${title}</div>
            <span class="plan-badge">${escapeHtml(plan)}</span>
          </div>
          ${alerts.join("")}
          ${windows}
          ${credits}
          ${auth}
          ${updated}
        </article>
      `;
    }

    function render(data) {
      cardsEl.innerHTML = [
        renderProvider("codex", data.codex),
        renderProvider("claude", data.claude),
      ].join("");

      statusLine.textContent = "Updated " + formatTime(data.fetchedAt);
      app.classList.remove("loading");
    }

    async function fetchQuota(force) {
      refreshBtn.disabled = true;
      const url = force ? "/api/quota?force=true" : "/api/quota";
      try {
        const res = await fetch(url);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed");
        render(data);
      } catch (err) {
        statusLine.textContent = "Error: " + (err.message || String(err));
        app.classList.remove("loading");
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function scheduleRefresh() {
      if (timer) clearInterval(timer);
      timer = setInterval(() => fetchQuota(false), REFRESH_MS);
    }

    refreshBtn.addEventListener("click", () => fetchQuota(true));
    app.classList.add("loading");
    fetchQuota(false);
    scheduleRefresh();
  </script>
</body>
</html>
